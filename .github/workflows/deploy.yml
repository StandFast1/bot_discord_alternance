name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: |
          missing=()
          for v in VPS_HOST VPS_USER VPS_SSH_KEY DISCORD_TOKEN \
                   DISCORD_GUILD_ID DISCORD_CHANNEL_ID DISCORD_USER_ID; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required GitHub Secrets: ${missing[*]}"
            echo "Add them at: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'sudo -n test -d /opt/alternance-bot || { echo "Run deploy/install.sh on the VPS first"; exit 1; }'

          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'sudo -n -u alternance git -C /opt/alternance-bot fetch --all --quiet && \
             sudo -n -u alternance git -C /opt/alternance-bot reset --hard origin/main --quiet && \
             sudo -n -u alternance /opt/alternance-bot/.venv/bin/pip install -r /opt/alternance-bot/requirements.txt --quiet --no-cache-dir'

      - name: Inject secrets into systemd EnvironmentFile
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          GRIMP_COOKIE: ${{ secrets.GRIMP_COOKIE }}
          BLUEBOX_COOKIE: ${{ secrets.BLUEBOX_COOKIE }}
        run: |
          ENVFILE="$(mktemp)"
          chmod 600 "$ENVFILE"
          cat > "$ENVFILE" <<EOF
          DISCORD_TOKEN=$DISCORD_TOKEN
          DISCORD_GUILD_ID=$DISCORD_GUILD_ID
          DISCORD_CHANNEL_ID=$DISCORD_CHANNEL_ID
          DISCORD_USER_ID=$DISCORD_USER_ID
          FRANCE_TRAVAIL_CLIENT_ID=$FRANCE_TRAVAIL_CLIENT_ID
          FRANCE_TRAVAIL_CLIENT_SECRET=$FRANCE_TRAVAIL_CLIENT_SECRET
          GRIMP_COOKIE=$GRIMP_COOKIE
          BLUEBOX_COOKIE=$BLUEBOX_COOKIE
          DB_PATH=/var/lib/alternance-bot/offers.db
          EXCEL_PATH=/var/lib/alternance-bot/candidatures.xlsx
          SCRAPE_INTERVAL_HOURS=2
          MAX_OFFERS_PER_CYCLE=30
          EOF

          scp -i ~/.ssh/id_ed25519 "$ENVFILE" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/alternance-env"
          rm -f "$ENVFILE"

          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'sudo -n install -m 0640 -o root -g alternance /tmp/alternance-env /etc/alternance-bot/env && \
             shred -u /tmp/alternance-env 2>/dev/null || rm -f /tmp/alternance-env'

      - name: Restart service
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'sudo -n systemctl daemon-reload && sudo -n systemctl restart alternance-bot && \
             sleep 3 && sudo -n systemctl is-active alternance-bot'
